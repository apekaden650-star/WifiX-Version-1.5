name: Compile WifiX Fixed Path

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Required Libraries
        run: |
          arduino-cli lib install "SimpleCLI"
          # Pakai versi 5.13.5 yang standar biar gak bentrok sama folder src
          arduino-cli lib install "ArduinoJson"@5.13.5

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder kerja wajib
          mkdir -p WifiXv1.5
          
          # 2. Copy SEMUA file dan sub-folder (src, data, dll)
          cp -a . WifiXv1.5/ 2>/dev/null || true
          
          # 3. Masuk ke folder kerja biar compiler nemu folder 'src' di dalemnya
          cd WifiXv1.5
          
          # 4. Compile dengan FQBN Spacehuhn
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          --output-dir ../build ./WifiXv1.5.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: WifiX-V1.5-Final-Bin
          path: ./build/*.bin
