name: Compile WifiX Final Fix Folder

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Official Libraries
        run: |
          # Install library pendukung secara global
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "Adafruit NeoPixel"
          arduino-cli lib install "ArduinoJson"@5.13.5

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder kerja wajib sesuai nama file .ino
          mkdir -p WifiXv1.5
          cp -rp ./* WifiXv1.5/ 2>/dev/null || true
          
          # 2. Rename folder di dalam src biar sesuai dengan panggilannya di kodingan
          # Ini buat fix error "No such file or directory"
          mv WifiXv1.5/src/ArduinoJson-v5.13.5 WifiXv1.5/src/ArduinoJson || true
          
          # 3. Folder output .bin
          mkdir -p build
          
          # 4. Compile pake Board NodeMCU (biar kenal pin D5) di SDK Spacehuhn
          # Pake setting eesz=4M2M (Flash 4MB, FS 2MB) sesuai request
          arduino-cli compile --fqbn deauther:esp8266:nodemcuv2:eesz=4M2M \
            --build-property "build.extra_flags=-I{build.source.path}/src" \
            --output-dir ./build ./WifiXv1.5/WifiXv1.5.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: WifiX-V1.5-Final-4M2M
          path: ./build/*.bin
