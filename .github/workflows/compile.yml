name: Compile Sketch

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/bin" >> $GITHUB_PATH

      - name: Setup Board and Libraries
        run: |
          arduino-cli core update-index
          # Ganti URL di bawah jika menggunakan ESP32
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          
          # Jika project butuh library tertentu, tambahkan di sini, contoh:
          # arduino-cli lib install "ArduinoJson"

      - name: Compile Sketch
        run: |
          # Sesuaikan nama file .ino jika berbeda
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 WifiXv1.5.ino
