name: Compile Sketch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Setup ESP8266 Core
        run: |
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder sesuai nama file .ino lu
          mkdir -p WifiXv1.5
          
          # 2. Pindahkan semua file ke folder tersebut biar Arduino CLI gak bingung
          cp -r * WifiXv1.5/ 2>/dev/null || true
          
          # 3. Jalankan compile langsung nembak file yang lu lingkarin itu
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 WifiXv1.5/WifiXv1.5.ino
