name: Compile Sketch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "${GITHUB_WORKSPACE}/bin" >> $GITHUB_PATH

      - name: Setup ESP8266 Core
        run: |
          ./bin/arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          # Pakai versi 2.7.4 karena lebih stabil untuk project Deauther/Network Tool
          ./bin/arduino-cli core install esp8266:esp8266@2.7.4 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Deauth Dependencies
        run: |
          # Install library yang biasanya dibutuhkan project WiFiX / Deauther
          ./bin/arduino-cli lib install "ESP8266WiFi"
          ./bin/arduino-cli lib install "ESPAsyncTCP"
          ./bin/arduino-cli lib install "ESPAsyncWebServer"

      - name: Fix Structure and Compile
        run: |
          mkdir -p WifiXv1.5
          cp -r * WifiXv1.5/ 2>/dev/null || true
          # Hapus folder hasil duplikasi agar tidak rekursif
          rm -rf WifiXv1.5/WifiXv1.5
          
          ./bin/arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 WifiXv1.5/WifiXv1.5.ino
