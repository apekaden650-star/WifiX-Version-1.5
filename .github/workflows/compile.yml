name: Compile Sketch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "${GITHUB_WORKSPACE}/bin" >> $GITHUB_PATH

      - name: Setup ESP8266 Core
        run: |
          ./bin/arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          # Kita pakai versi 2.7.4 yang lebih stabil buat project Deauther/WiFiX
          ./bin/arduino-cli core install esp8266:esp8266@2.7.4 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder sesuai nama file .ino lu
          mkdir -p WifiXv1.5
          
          # 2. Copy SEMUA isi repo ke folder baru (biar oui.h masuk)
          cp -a . WifiXv1.5/ 2>/dev/null || true
          
          # 3. Compile langsung ke file yang lu lingkarin
          ./bin/arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 WifiXv1.5/WifiXv1.5.ino
