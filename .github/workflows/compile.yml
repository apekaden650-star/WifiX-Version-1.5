name: Compile WifiX Final Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Required Libraries
        run: |
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson"@5.13.5

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder wajib sesuai nama .ino
          mkdir -p WifiXv1.5
          
          # 2. Copy SEMUA file ke folder kerja
          cp -rp ./* WifiXv1.5/ 2>/dev/null || true
          
          # 3. Compile pake Board NodeMCU biar Wemos D1 Mini lu kenal pin D5, D6, dll.
          # Kita tambahin --build-property buat paksa compiler liat folder src
          arduino-cli compile --fqbn deauther:esp8266:nodemcuv2:eesz=4M1M \
            --build-property "build.extra_flags=-I{build.source.path}/src/ArduinoJson-v5.13.5" \
            --output-dir ./build ./WifiXv1.5/WifiXv1.5.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: WifiX-V1.5-Wemos-Bin
          path: ./build/*.bin
