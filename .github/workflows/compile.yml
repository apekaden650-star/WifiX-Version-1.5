name: Compile WifiX Final 4M2M

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Official Libraries
        run: |
          # Install versi resmi biar gak bentrok sama isi folder src lu
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson"@5.13.5
          arduino-cli lib install "Adafruit NeoPixel"

      - name: Fix Structure and Compile
        run: |
          # 1. Buat folder wajib sesuai nama .ino
          mkdir -p WifiXv1.5
          cp -rp ./* WifiXv1.5/ 2>/dev/null || true
          
          # 2. HAPUS library bermasalah di folder src biar gak bentrok (WAJIB!)
          rm -rf WifiXv1.5/src/Adafruit_NeoPixel-1.7.0
          rm -rf WifiXv1.5/src/ArduinoJson-v5.13.5
          
          # 3. Folder output .bin
          mkdir -p build
          
          # 4. Compile pake Board NodeMCU (biar kenal pin D5) tapi tetep SDK Spacehuhn
          # Pake setting eesz=4M2M sesuai request lu
          arduino-cli compile --fqbn deauther:esp8266:nodemcuv2:eesz=4M2M \
            --output-dir ./build ./WifiXv1.5/WifiXv1.5.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: WifiX-V1.5-Final-4M2M
          path: ./build/*.bin
